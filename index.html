    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #050508;
    color: #e8e8f0;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ========== ANIMATED LAKEVIYA BACKGROUND ========== */
  .lakeviya-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    overflow: hidden;
  }

  .lakeviya-text {
    font-size: clamp(3rem, 15vw, 12rem);
    font-weight: 900;
    font-family: 'Segoe UI', 'Poppins', sans-serif;
    text-transform: uppercase;
    background: linear-gradient(135deg, #7c6aff20, #ff6a9c20, #6affcc20);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    white-space: nowrap;
    animation: lakeviyaFloat 8s ease-in-out infinite, lakeviyaRotate 12s linear infinite, lakeviyaGlow 3s ease-in-out infinite;
    transform-origin: center;
    letter-spacing: 0.1em;
    user-select: none;
  }

  @keyframes lakeviyaFloat {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.15; }
    25% { transform: translate(2%, -2%) scale(1.02); opacity: 0.2; }
    50% { transform: translate(-2%, 1%) scale(0.98); opacity: 0.18; }
    75% { transform: translate(1%, 2%) scale(1.01); opacity: 0.22; }
  }

  @keyframes lakeviyaRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes lakeviyaGlow {
    0%, 100% { text-shadow: 0 0 10px rgba(124,106,255,0.2), 0 0 20px rgba(255,106,156,0.1); }
    50% { text-shadow: 0 0 30px rgba(124,106,255,0.4), 0 0 50px rgba(255,106,156,0.2); }
  }

  /* Other 3D Background Layers */
  .bg-container {
    position: fixed;
    inset: 0;
    z-index: -2;
    overflow: hidden;
  }

  .bg-layer {
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
  }

  .bg-1 {
    background: radial-gradient(ellipse at 30% 40%, rgba(124,106,255,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(255,106,156,0.1) 0%, transparent 50%);
    animation: rotateSlow 40s linear infinite;
  }

  .bg-2 {
    background: repeating-linear-gradient(45deg, rgba(124,106,255,0.02) 0px, rgba(124,106,255,0.02) 1px, transparent 1px, transparent 20px);
    animation: shiftFast 15s linear infinite;
  }

  @keyframes rotateSlow {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }

  @keyframes shiftFast {
    0% { background-position: 0 0; }
    100% { background-position: 100px 100px; }
  }

  /* Floating Particles */
  .particle-3d {
    position: fixed;
    pointer-events: none;
    z-index: -1;
  }

  .particle {
    position: absolute;
    background: linear-gradient(135deg, #7c6aff, #ff6a9c);
    border-radius: 50%;
    filter: blur(6px);
    animation: particleDrift 8s ease-in-out infinite;
  }

  @keyframes particleDrift {
    0% { transform: translate(0, 0) scale(1); opacity: 0; }
    20% { opacity: 0.4; }
    80% { opacity: 0.2; }
    100% { transform: translate(var(--tx, 100px), var(--ty, -100px)) scale(0); opacity: 0; }
  }

  /* Main Container */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
    padding: 1rem;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 1.5rem;
    transform-style: preserve-3d;
    perspective: 500px;
  }

  .glow-text {
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff, #7c6aff, #ff6a9c, #6affcc);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: gradientShift 4s ease infinite, titleFloat 2.5s ease-in-out infinite;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  @keyframes titleFloat {
    0%, 100% { transform: translateZ(0px); text-shadow: 0 0 15px rgba(124,106,255,0.3); }
    50% { transform: translateZ(30px); text-shadow: 0 0 40px rgba(124,106,255,0.6); }

  .subtitle {
    font-size: 0.7rem;
    color: #8b8baa;
    transform: translateZ(15px);

    perspective: 400px;

  .search-input {
    width: 100%;
    padding: 10px 20px;

    border: 1px solid rgba(124,106,255,0.3);
    border-radius: 50px;
    color: white;
    font-size: 0.85rem;
    outline: none;

    text-align: center;

    box-shadow: 0 0 30px rgba(124,106,255,0.4);
  }

    gap: 1rem;
    transform-style: preserve-3d;
    perspective: 1200px;

  .card {
    background: rgba(17, 17, 24, 0.45);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 0.9rem;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    cursor: pointer;
    transform-style: preserve-3d;
    transform: translateZ(0);
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    border: 1px solid rgba(124,106,255,0.12);
    animation: cardAppear 0.5s ease backwards;

    display: flex;
    flex-direction: column;

  @keyframes cardAppear {
    from { opacity: 0; transform: translateY(40px) rotateX(15deg) scale(0.9); }

  .cursor-3d {

    .popup-item { padding: 6px 12px; font-size: 0.75rem; }

</style>

let currentSearch = "";
let activePopup = null;

// Particles
function createParticles() {
  const container = document.getElementById('particleContainer');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 30 + 15;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
    p.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
    p.style.animationDelay = Math.random() * 8 + 's';
    container.appendChild(p);
  }
}

function getFilteredTools() {
  let f = [...tools];
  if (currentSearch.trim()) {
    const q = currentSearch.toLowerCase();
    f = f.filter(t => t.name.toLowerCase().includes(q) || t.purpose.toLowerCase().includes(q));
  }
  return f;
}

function openTool(url) {
  let finalUrl = url;
  if (!url.startsWith('http')) finalUrl = 'https://' + url;
  window.open(finalUrl, '_blank');
}

  if (button) {
    const rect = button.getBoundingClientRect();
    popup.style.left = rect.left + 'px';
    popup.style.top = (rect.bottom + 5) + 'px';
    setTimeout(() => {
      const popupRect = popup.getBoundingClientRect();
      if (popupRect.right > window.innerWidth) {
        popup.style.left = (window.innerWidth - popupRect.width - 10) + 'px';
      }
    }, 0);
  } else {
    popup.style.left = '50%';
    popup.style.top = '50%';
    popup.style.transform = 'translate(-50%, -50%)';
  }
  
  popup.querySelector('[data-type="youtube"]').addEventListener('click', (e) => {
    e.stopPropagation();
    window.open(youtubeUrl, '_blank');
    popup.remove();
    activePopup = null;
  });
  popup.querySelector('[data-type="google"]').addEventListener('click', (e) => {
    e.stopPropagation();
    window.open(googleUrl, '_blank');
    popup.remove();
    activePopup = null;
  });
  popup.querySelector('[data-type="wikipedia"]').addEventListener('click', (e) => {
    e.stopPropagation();
    window.open(wikipediaUrl, '_blank');
    popup.remove();
    activePopup = null;
  });
  
  document.body.appendChild(popup);
  activePopup = popup;
  
  const closeHandler = (e) => {
    if (!popup.contains(e.target)) {
      popup.remove();
      activePopup = null;
      document.removeEventListener('click', closeHandler);
      document.removeEventListener('keydown', escHandler);
    }
  };
  const escHandler = (e) => {
    if (e.key === 'Escape') {
      popup.remove();
      activePopup = null;
      document.removeEventListener('click', closeHandler);
      document.removeEventListener('keydown', escHandler);
    }
  };
  setTimeout(() => {
    document.addEventListener('click', closeHandler);
    document.addEventListener('keydown', escHandler);
  }, 0);
}

// Render cards with "How to use" button
function renderCards() {
  const filtered = getFilteredTools();
  const grid = document.getElementById('toolsGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-3d">✨ No tools found ✨<br><span style="font-size:0.65rem;">Try searching something else</span></div>`;
    return;
  }
  grid.innerHTML = filtered.map((t, idx) => {
    const safeName = escapeHtml(t.name);
    const safePurpose = escapeHtml(t.purpose);
    return `
      <div class="card" onclick="openTool('${t.url}')" style="--i: ${idx}">
        <div class="card-header">
          <div class="card-icon">${t.icon}</div>
          <div class="card-name">${safeName}</div>
        </div>
        <div class="card-purpose">🎯 ${safePurpose}</div>
        <div class="card-tutorial">
          <button class="learn-btn" data-tool="${t.name.replace(/'/g, "\\'")}">📘 How to use</button>
        </div>
      </div>
    `;
  }).join('');
  
  document.querySelectorAll('.learn-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const toolName = btn.getAttribute('data-tool');
      if (toolName) showLearnPopup(toolName, e);
    });
  });
  attachTiltEvents();
}

function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

function attachTiltEvents() {
  document.querySelectorAll('.card').forEach(card => {
    card.removeEventListener('mousemove', tiltMove);
    card.removeEventListener('mouseleave', tiltLeave);
    card.addEventListener('mousemove', tiltMove);
    card.addEventListener('mouseleave', tiltLeave);
  });
}
function tiltMove(e) {
  const rect = this.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width - 0.5;
  const y = (e.clientY - rect.top) / rect.height - 0.5;
  this.style.transform = `translateY(-8px) translateZ(25px) rotateX(${y * 8}deg) rotateY(${x * 8}deg) scale(1.02)`;
}
function tiltLeave() { this.style.transform = ''; }

// Search & init
document.getElementById('search').addEventListener('input', e => { currentSearch = e.target.value; renderCards(); });
document.addEventListener('keydown', e => {
  if (e.key === '/') { e.preventDefault(); document.getElementById('search').focus(); }
  if (e.key === 'Escape') {
    document.getElementById('search').blur();
    if (activePopup) { activePopup.remove(); activePopup = null; }
  }
});
const cursor = document.getElementById('cursor3d');
document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });

createParticles();
renderCards();
</script>
